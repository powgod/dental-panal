<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Medical History</title>
    <link rel="stylesheet" href="assets/css/style.css" />
    <link rel="stylesheet" href="assets/css/toast.css" />
    <link rel="icon" type="image/png" href="assets/images/favicon.png" />
    <link
      rel="stylesheet"
      href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css"
    />
    <link
      href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600&display=swap"
      rel="stylesheet"
    />
  </head>
  <body>
    <div class="container">
      <div class="sidebar">
        <div class="sidebar-title">🦷 ClinicPanel</div>
        <a href="dashboard.html" class="menu-link"
          ><i class="fa fa-chart-line"></i> Dashboard</a
        >
        <a href="patients.html" class="menu-link"
          ><i class="fa fa-user-injured"></i> Patients</a
        >
        <a href="medical_history.html" class="menu-link active"
          ><i class="fa fa-notes-medical"></i> Medical History</a
        >
        <a href="labos.html" class="menu-link"
          ><i class="fa fa-flask"></i> Lab Work</a
        >
        <a href="reception.html" class="menu-link"
          ><i class="fa fa-bell"></i> Reception</a
        >
        <a href="expenses.html" class="menu-link"
          ><i class="fa fa-wallet"></i> Expense</a
        >
        <a href="medical.html" class="menu-link"
          ><i class="fa fa-kit-medical"></i> Medical Supplies</a
        >
        <a href="appointments.html" class="menu-link"
          ><i class="fa fa-calendar-check"></i> Appointments</a
        >
        <a href="chatbot.html" class="menu-link"
          ><i class="fa fa-robot"></i> AI Chatbot</a
        >
        <div class="logout-container">
          <button id="logoutBtn">
            <i class="fa fa-sign-out-alt"></i> Logout
          </button>
        </div>
      </div>

      <div class="content">
        <header>
          <h1>🩺 Medical History</h1>
          <button id="addPatientBtn">+ Add New Patient</button>
        </header>

        <table>
          <thead>
            <tr>
              <th>Image</th>
              <th>Patient Name</th>
              <th>Date Created</th>
              <th>Actions</th>
            </tr>
          </thead>
          <tbody id="medicalTable"></tbody>
        </table>
      </div>
    </div>

    <!-- Link to separated JS -->
    <script src="https://www.gstatic.com/firebasejs/9.22.0/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.22.0/firebase-database-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.22.0/firebase-auth-compat.js"></script>
    <script src="assets/js/firebase.js"></script>
    <!-- ✅ your config file -->
    <script src="assets/js/common.js"></script>
    <script src="assets/js/toast.js"></script>
    <script src="assets/js/medical_history.js"></script>
    <script>
      if (localStorage.getItem("loggedIn") !== "true") {
        window.location.href = "index.html";
      }
    </script>

    <!-- Toast Container -->
    <div id="toast-container"></div>
  </body>
</html>
