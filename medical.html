<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>Medical Supplies</title>
    <link rel="stylesheet" href="assets/css/style.css" />
    <link rel="stylesheet" href="assets/css/toast.css" />
    <link rel="icon" type="image/png" href="assets/images/favicon.png" />
    <link
      href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600&display=swap"
      rel="stylesheet"
    />
    <link
      rel="stylesheet"
      href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css"
    />
  </head>
  <body>
    <div class="container">
      <div class="sidebar">
        <div class="sidebar-title">🦷 ClinicPanel</div>
        <a href="dashboard.html" class="menu-link"
          ><i class="fa fa-chart-line"></i> Dashboard</a
        >
        <a href="patients.html" class="menu-link"
          ><i class="fa fa-user-injured"></i> Patients</a
        >
        <a href="medical_history.html" class="menu-link"
          ><i class="fa fa-notes-medical"></i> Medical History</a
        >
        <a href="labos.html" class="menu-link"
          ><i class="fa fa-flask"></i> Lab Work</a
        >
        <a href="reception.html" class="menu-link"
          ><i class="fa fa-bell"></i> Reception</a
        >
        <a href="expenses.html" class="menu-link"
          ><i class="fa fa-wallet"></i> Expense</a
        >
        <a href="medical.html" class="menu-link active"
          ><i class="fa fa-kit-medical"></i> Medical Supplies</a
        >
        <a href="appointments.html" class="menu-link"
          ><i class="fa fa-calendar-check"></i> Appointments</a
        >
        <a href="chatbot.html" class="menu-link"
          ><i class="fa fa-robot"></i> AI Chatbot</a
        >
        <div class="logout-container">
          <button id="logoutBtn">
            <i class="fa fa-sign-out-alt"></i> Logout
          </button>
        </div>
      </div>

      <div class="content">
        <h1>Medical Supplies</h1>

        <form id="supplyForm">
          <input
            type="text"
            id="supplyName"
            placeholder="Supply Name (e.g. Gloves)"
            required
          />
          <input
            type="number"
            id="supplyQuantity"
            placeholder="Quantity"
            min="1"
            required
          />
          <input
            type="number"
            id="supplyPrice"
            placeholder="Unit Price (MAD)"
            min="0"
            step="0.01"
            required
          />
          <button type="submit">Add Supply</button>
        </form>

        <table id="supplyTable">
          <tbody>
            <!-- Supplies will go here -->
          </tbody>
        </table>
      </div>
    </div>
    <script src="https://www.gstatic.com/firebasejs/9.22.2/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.22.2/firebase-database-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.22.2/firebase-auth-compat.js"></script>
    <script src="assets/js/firebase.js"></script>
    <script src="assets/js/common.js"></script>
    <script src="assets/js/toast.js"></script>
    <script src="assets/js/medical.js"></script>

    <script>
      if (localStorage.getItem("loggedIn") !== "true") {
        window.location.href = "index.html";
      }
    </script>

    <!-- Toast Container -->
    <div id="toast-container"></div>
  </body>
</html>
