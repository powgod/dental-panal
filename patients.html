<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Manage Patients</title>
  <link rel="stylesheet" href="assets/css/style.css">
  <link rel="stylesheet" href="assets/css/toast.css">
  <link rel="icon" type="image/png" href="assets/images/favicon.png">
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600&display=swap" rel="stylesheet">
</head>
<body>
  <div class="container">
    <div class="sidebar">
      <div class="sidebar-title">🦷 ClinicPanel</div>
      <a href="dashboard.html" class="menu-link"><i class="fa fa-chart-line"></i> Dashboard</a>
      <a href="patients.html" class="menu-link active"><i class="fa fa-user-injured"></i> Patients</a>
      <a href="medical_history.html" class="menu-link"><i class="fa fa-notes-medical"></i> Medical History</a>
      <a href="labos.html" class="menu-link"><i class="fa fa-flask"></i> Lab Work</a>
      <a href="reception.html" class="menu-link"><i class="fa fa-bell"></i> Reception</a>
      <a href="expenses.html" class="menu-link"><i class="fa fa-wallet"></i> Expense</a>
      <a href="medical.html" class="menu-link"><i class="fa fa-kit-medical"></i> Medical Supplies</a>
      <a href="appointments.html" class="menu-link"><i class="fa fa-calendar-check"></i> Appointments</a>
      <a href="chatbot.html" class="menu-link"><i class="fa fa-robot"></i> AI Chatbot</a>
      <a href="profile.html" class="menu-link"><i class="fa fa-user-circle"></i> Profile</a>
      <div class="logout-container">
        <button id="logoutBtn"><i class="fa fa-sign-out-alt"></i> Logout</button>
      </div>      
    </div>
    <div class="content">
      <h1>Patients</h1>
      
      <!-- Search and Filter Section -->
      <div class="search-filter-section">
        <input type="text" id="searchBar" placeholder="🔍 Search by name, phone..." />
        <select id="filterStatus" aria-label="Filter by status">
          <option value="">All Status</option>
          <option value="Still Working">Still Working</option>
          <option value="Finished">Finished</option>
          <option value="In Labo">In Labo</option>
        </select>
        <select id="filterWork" aria-label="Filter by work type">
          <option value="">All Work Types</option>
          <option value="Céramique">Céramique</option>
          <option value="zirconia">zirconia</option>
          <option value="Resine">Resine</option>
          <option value="tcs">tcs</option>
          <option value="Les facettes">Les facettes</option>
          <option value="composete">composete</option>
          <option value="les bagues">les bagues</option>
          <option value="Extraction">Extraction</option>
          <option value="Blanchisment">Blanchisment</option>
          <option value="Nettoiage">Nettoiage</option>
          <option value="Snap On Smile">Snap On Smile</option>
          <option value="Provisoire">Provisoire</option>
        </select>
        <button id="exportBtn" class="export-btn">📥 Export to CSV</button>
      </div>

      <div class="action-group" style="margin-bottom: 10px">
        <button class="primary-btn" data-toggle-target="patientForm">
          + Add Patient
        </button>
      </div>

      <form id="patientForm" class="hidden card collapsible">
        <input type="text" id="patientName" placeholder="Name" required>
        <input type="text" id="patientPhone" placeholder="Phone" required>
        <select id="patientWork" aria-label="Type of work" required>
          <option disabled selected>Type of Work</option>
          <option>Céramique</option><option>zirconia</option><option>Resine</option>
          <option>tcs</option><option>Les facettes</option><option>composete</option>
          <option>les bagues</option><option>Extraction</option><option>Blanchisment</option>
          <option>Nettoiage</option><option>Snap On Smile</option><option>Provisoire</option>
        </select>
        <input type="text" id="patientNote" placeholder="Note" />
        <input type="date" id="firstVisit" placeholder="First Visit" required />
        <input type="date" id="nextVisit" placeholder="Next Payment" />
        <select id="patientStatus" aria-label="Patient status" required>
          <option disabled selected>Status</option>
          <option>Still Working</option>
          <option>Finished</option>
          <option>In Labo</option>
        </select>
        <input type="number" id="patientPrice" placeholder="Price" required />
        <input type="number" id="patientAdvance" placeholder="Advance" required />
        <input type="date" id="patientDate" title="Date" required />
        <div class="form-actions">
          <button type="submit" class="primary-btn">Add Patient</button>
          <button type="button" class="ghost-btn" data-toggle-target="patientForm">
            Cancel
          </button>
        </div>
      </form>
      <table id="patientTable">
        <thead><tr><th>Name</th><th>Phone</th><th>Work</th><th>Status</th><th>Note</th><th>First Visit</th><th>Next Pay</th><th>Price</th><th>Advance</th><th>Remaining</th><th>Date</th><th>Actions</th> </tr></thead>
        <tbody></tbody>
      </table>
    </div>
  </div>
  <!-- History Modal -->
  <div id="historyModal" class="modal">
    <div class="modal-content">
      <h2>Patient History</h2>
      <div id="historyContent" class="modal-history-content"></div>
      <button id="closeModalBtn">Close</button>
</div>
</div>


<div id="editModal" class="modal">
  <div class="modal-content">
    <span class="close-btn" onclick="closeModal()">&times;</span>
    <h2>Edit Patient</h2>
    <input type="text" id="editName" placeholder="Full Name" required>
    <input type="text" id="editPhone" placeholder="Phone Number" required>
    <select id="editStatus" aria-label="Edit patient status">
      <option value="Still Working">Still Working</option>
      <option value="Finished">Finished</option>
      <option value="In Labo">In Labo</option>
    </select>
    <input type="number" id="editAdvance" placeholder="Add Advance (MAD)">
    <button onclick="saveEdit()">💾 Save</button>

    <h3>Advance History</h3>
    <ul id="historyList"></ul>
  </div>
</div>



</div>
<script src="https://www.gstatic.com/firebasejs/9.22.2/firebase-app-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/9.22.2/firebase-database-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/9.22.2/firebase-auth-compat.js"></script>
    <script src="assets/js/firebase.js"></script>
    <script src="assets/js/common.js"></script>
    <script src="assets/js/toast.js"></script>
    <script src="assets/js/patients.js"></script>  <script>
    if (localStorage.getItem("loggedIn") !== "true") {
      window.location.href = "index.html";
    }
  </script>
  
  <!-- Toast Container -->
  <div id="toast-container"></div>
  
</body>
</html>
