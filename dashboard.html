<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Dashboard</title>
    <link rel="stylesheet" href="assets/css/style.css" />
    <link rel="stylesheet" href="assets/css/toast.css" />
    <link rel="icon" type="image/png" href="assets/images/favicon.png" />
    <link
      rel="stylesheet"
      href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css"
    />
    <link
      href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600&display=swap"
      rel="stylesheet"
    />
    <script src="https://cdn.jsdelivr.net/npm/chart.js@4.4.0/dist/chart.umd.min.js"></script>
  </head>
  <body>
    <div class="container">
      <div class="sidebar">
        <div class="sidebar-title">🦷 ClinicPanel</div>
        <a href="dashboard.html" class="menu-link active"
          ><i class="fa fa-chart-line"></i> Dashboard</a
        >
        <a href="patients.html" class="menu-link"
          ><i class="fa fa-user-injured"></i> Patients</a
        >
        <a href="medical_history.html" class="menu-link"
          ><i class="fa fa-notes-medical"></i> Medical History</a
        >
        <a href="labos.html" class="menu-link"
          ><i class="fa fa-flask"></i> Lab Work</a
        >
        <a href="reception.html" class="menu-link"
          ><i class="fa fa-bell"></i> Reception</a
        >
        <a href="expenses.html" class="menu-link"
          ><i class="fa fa-wallet"></i> Expense</a
        >
        <a href="medical.html" class="menu-link"
          ><i class="fa fa-kit-medical"></i> Medical Supplies</a
        >
        <a href="appointments.html" class="menu-link"
          ><i class="fa fa-calendar-check"></i> Appointments</a
        >
        <a href="chatbot.html" class="menu-link"
          ><i class="fa fa-robot"></i> AI Chatbot</a
        >
        <a href="profile.html" class="menu-link"
          ><i class="fa fa-user-circle"></i> Profile</a
        >
        <div class="logout-container">
          <button id="logoutBtn">
            <i class="fa fa-sign-out-alt"></i> Logout
          </button>
        </div>
      </div>
      <div class="content">
        <div class="dashboard-hero card">
          <div>
            <p class="eyebrow">Overview</p>
            <h1 id="dashboardWelcome">Welcome Back, Doctor!</h1>
            <p class="muted" id="dashboardDate">Loading...</p>
          </div>
          <div class="pill-switch" id="timeframeSwitch">
            <button class="pill-btn active" data-range="weekly">Weekly</button>
            <button class="pill-btn" data-range="monthly">Monthly</button>
            <button class="pill-btn" data-range="yearly">Yearly</button>
          </div>
        </div>

        <!-- Skeleton placeholders -->
        <div class="charts-grid skeleton-block" id="chartsSkeleton">
          <div class="chart-container card skeleton-card">
            <div class="skeleton-line medium"></div>
            <div class="skeleton-box large"></div>
          </div>
          <div class="chart-container card skeleton-card">
            <div class="skeleton-line medium"></div>
            <div class="skeleton-box large"></div>
          </div>
        </div>

        <div class="charts-grid skeleton-block" id="barSkeleton">
          <div class="chart-container card skeleton-card">
            <div class="skeleton-line medium"></div>
            <div class="skeleton-box large"></div>
          </div>
        </div>

        <div class="insights-grid skeleton-block" id="insightsSkeletonA">
          <div class="card skeleton-card">
            <div class="skeleton-line medium"></div>
            <div class="skeleton-line wide"></div>
            <div class="skeleton-line tiny"></div>
          </div>
          <div class="card skeleton-card">
            <div class="skeleton-line medium"></div>
            <div class="skeleton-line wide"></div>
            <div class="skeleton-line tiny"></div>
          </div>
        </div>

        <div class="insights-grid skeleton-block" id="insightsSkeletonB">
          <div class="card skeleton-card">
            <div class="skeleton-line medium"></div>
            <div class="skeleton-line wide"></div>
            <div class="skeleton-line tiny"></div>
          </div>
          <div class="card skeleton-card">
            <div class="skeleton-line medium"></div>
            <div class="skeleton-line wide"></div>
            <div class="skeleton-line tiny"></div>
          </div>
        </div>

        <div class="insights-grid skeleton-block" id="insightsSkeletonC">
          <div class="card skeleton-card">
            <div class="skeleton-line medium"></div>
            <div class="skeleton-line wide"></div>
            <div class="skeleton-line tiny"></div>
          </div>
          <div class="card skeleton-card">
            <div class="skeleton-line medium"></div>
            <div class="skeleton-line wide"></div>
            <div class="skeleton-line tiny"></div>
          </div>
        </div>

        <!-- Live content -->
        <div class="dashboard-metrics enhanced-grid live-block hidden" id="dashboard">
          <!-- Metrics populated by JS -->
        </div>

        <div class="charts-grid live-block hidden" id="chartsGrid">
          <div class="chart-container card">
            <div class="card-header">
              <h3><i class="fa fa-chart-line"></i> Appointment Performance</h3>
              <span class="chip chip-scheduled">Revenue Trend</span>
            </div>
            <canvas id="revenueChart"></canvas>
          </div>
          <div class="chart-container card">
            <div class="card-header">
              <h3><i class="fa fa-chart-pie"></i> Top Treatments</h3>
            </div>
            <canvas id="workTypeChart"></canvas>
          </div>
        </div>

        <div class="live-block hidden" id="barGrid">
          <div class="chart-container card">
            <div class="card-header">
              <h3><i class="fa fa-chart-column"></i> Appointment Financials</h3>
            </div>
            <canvas id="barChart"></canvas>
          </div>
        </div>

        <div class="insights-grid live-block hidden" id="insightsGridA">
          <div class="card" id="nextPatientCard"></div>
          <div class="card" id="approvalCard"></div>
        </div>

        <div class="insights-grid live-block hidden" id="insightsGridB">
          <div class="card" id="todayAppointmentsCard"></div>
          <div class="card" id="successStatsCard"></div>
        </div>

        <div class="insights-grid live-block hidden" id="insightsGridC">
          <div class="card" id="patientsThisMonthCard"></div>
          <div class="card" id="earningsCard"></div>
        </div>
      </div>
    </div>

    <!-- Toast Container -->
    <div id="toast-container"></div>

    <!-- Firebase Scripts -->
    <script src="https://www.gstatic.com/firebasejs/9.22.2/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.22.2/firebase-database-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.22.2/firebase-auth-compat.js"></script>
    <script src="assets/js/firebase.js"></script>
    <script src="assets/js/subscription-check.js"></script>
    <script src="assets/js/common.js"></script>
    <script src="assets/js/toast.js"></script>
    <script src="assets/js/dashboard.js"></script>
  </body>
</html>
