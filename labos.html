<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>Lab Work</title>
    <link rel="stylesheet" href="assets/css/style.css" />
    <link rel="stylesheet" href="assets/css/toast.css" />
    <link rel="icon" type="image/png" href="assets/images/favicon.png" />
    <link
      href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600&display=swap"
      rel="stylesheet"
    />
    <link
      rel="stylesheet"
      href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css"
    />
  </head>
  <body>
    <div class="container">
      <div class="sidebar">
        <div class="sidebar-title">🦷 ClinicPanel</div>
        <a href="dashboard.html" class="menu-link"
          ><i class="fa fa-chart-line"></i> Dashboard</a
        >
        <a href="patients.html" class="menu-link"
          ><i class="fa fa-user-injured"></i> Patients</a
        >
        <a href="medical_history.html" class="menu-link"
          ><i class="fa fa-notes-medical"></i> Medical History</a
        >
        <a href="labos.html" class="menu-link active"
          ><i class="fa fa-flask"></i> Lab Work</a
        >
        <a href="reception.html" class="menu-link"
          ><i class="fa fa-bell"></i> Reception</a
        >
        <a href="expenses.html" class="menu-link"
          ><i class="fa fa-wallet"></i> Expense</a
        >
        <a href="medical.html" class="menu-link"
          ><i class="fa fa-kit-medical"></i> Medical Supplies</a
        >
        <a href="appointments.html" class="menu-link"
          ><i class="fa fa-calendar-check"></i> Appointments</a
        >
        <a href="chatbot.html" class="menu-link"
          ><i class="fa fa-robot"></i> AI Chatbot</a
        >
        <a href="profile.html" class="menu-link"
          ><i class="fa fa-user-circle"></i> Profile</a
        >
        <div class="logout-container">
          <button id="logoutBtn">
            <i class="fa fa-sign-out-alt"></i> Logout
          </button>
        </div>
      </div>

      <div class="content">
        <h1>Lab Work</h1>

        <!-- Search and Filter Section -->
        <div class="search-filter-section">

          <div class="search-left">
      
              <input
                  type="text"
                  id="searchLaboBar"
                  placeholder="🔍 Search patient..." />
      
              <select id="filterLaboStatus">
      
                  <option value="">All Status</option>
                  <option>Working</option>
                  <option>Delivered</option>
                  <option>Sent</option>
      
              </select>
      
          </div>
      
          <div class="search-right">
      
              <button id="exportLaboBtn" class="ghost-btn">
      
                  <i class="fa-solid fa-download"></i>
      
                  Export CSV
      
              </button>
      
              <button
                  class="primary-btn"
                  data-toggle-target="laboForm">
      
                  <i class="fa-solid fa-plus"></i>
      
                  Add Lab Work
      
              </button>
      
          </div>
      
      </div>

      

        <!-- Add Labo Form -->
        <form id="laboForm" class="hidden card collapsible">

          <div class="form-grid">
      
              <div class="form-group">
      
                  <label>Patient Name</label>
      
                  <input
                      type="text"
                      id="laboName"
                      required>
      
              </div>
      
              <div class="form-group">
      
                  <label>Price</label>
      
                  <input
                      type="number"
                      id="laboPrice"
                      required>
      
              </div>
      
              <div class="form-group">
      
                  <label>Date Received</label>
      
                  <input
                      type="date"
                      id="laboDate"
                      required>
      
              </div>
      
              <div class="form-group">
      
                  <label>Date Delivered</label>
      
                  <input
                      type="date"
                      id="laboSendDate"
                      required>
      
              </div>
      
              <div class="form-group">
      
                  <label>Status</label>
      
                  <select id="laboStatus">
      
                      <option>Working</option>
                      <option>Delivered</option>
                      <option>Sent</option>
      
                  </select>
      
              </div>
      
              <div class="form-group note-group">
      
                  <label>Note</label>
      
                  <textarea
                      id="laboNote"
                      rows="4"></textarea>
      
              </div>
      
          </div>
      
          <div class="modal-actions">
      
              <button
                  type="button"
                  class="ghost-btn"
                  data-toggle-target="laboForm">
      
                  Cancel
      
              </button>
      
              <button
                  type="submit"
                  class="primary-btn">
      
                  Save Lab Work
      
              </button>
      
          </div>
      
      </form>

        <table id="laboTable">
          <thead>
            <tr>
              <th>Name</th>
              <th>Price</th>
              <th>Date</th>
              <th>Status</th>
              <th>Send Date</th>
              <th>Actions</th>
            </tr>
          </thead>
          <tbody></tbody>
        </table>
      </div>
    </div>

    <!-- Edit Labo Modal -->
    <div id="laboModal" class="modal">
    <div class="modal-content labo-edit-modal">

      <h2>✏️ Edit Lab Work</h2>
  
      <div class="form-grid">
  
          <div class="form-group">
              <label>Patient Name</label>
              <input type="text" id="editLaboName">
          </div>
  
          <div class="form-group">
              <label>Price</label>
              <input type="number" id="editLaboPrice">
          </div>
  
          <div class="form-group">
              <label>Date Received</label>
              <input type="date" id="editLaboDate">
          </div>
  
          <div class="form-group">
              <label>Date Delivered</label>
              <input type="date" id="editLaboSendDate">
          </div>
  
          <div class="form-group">
              <label>Status</label>
  
              <select id="editLaboStatus">
                  <option>Working</option>
                  <option>Delivered</option>
                  <option>Sent</option>
              </select>
  
          </div>
  
          <div class="form-group note-group">
  
              <label>Note</label>
  
              <textarea
                  id="editLaboNote"
                  rows="4"></textarea>
  
          </div>
  
      </div>
  
      <div class="modal-actions">
  
          <button
              class="ghost-btn"
              onclick="closeLaboModal()">
  
              Cancel
  
          </button>
  
          <button
              class="primary-btn"
              onclick="saveLaboEdit()">
  
              Save Changes
  
          </button>
  
      </div>
  
  </div>
</div>

    <div id="laboNoteModal" class="modal note-modal">

      <div class="modal-content">
  
          <h2>📝 Lab Note</h2>
  
          <div id="laboNoteContent" class="note-content"></div>
  
          <div class="modal-actions">
  
              <button
                  class="ghost-btn"
                  onclick="closeLaboNote()">
  
                  Close
  
              </button>
  
          </div>
  
      </div>
  
  </div>

    <script src="https://www.gstatic.com/firebasejs/9.22.2/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.22.2/firebase-database-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.22.2/firebase-auth-compat.js"></script>
    <script src="assets/js/firebase.js"></script>
    <script src="assets/js/subscription-check.js"></script>
    <script src="assets/js/common.js"></script>
    <script src="assets/js/labos.js"></script>

    <script>
      if (localStorage.getItem("loggedIn") !== "true") {
        window.location.href = "index.html";
      }

      // Modal open/close handlers (you can also put these in labos.js)
      const laboModal = document.getElementById("laboModal");
      const laboModalClose = document.getElementById("laboModalClose");

      laboModalClose.addEventListener("click", () => {
        laboModal.style.display = "none";
      });

      window.onclick = function (event) {
        if (event.target === laboModal) {
          laboModal.style.display = "none";
        }
      };
    </script>

    <!-- Toast System -->
    <script src="assets/js/toast.js"></script>
    <div id="toast-container"></div>
  </body>
</html>
