<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Reception</title>
    <link rel="stylesheet" href="assets/css/style.css" />
    <link rel="stylesheet" href="assets/css/toast.css" />
    <link rel="icon" type="image/png" href="assets/images/favicon.png" />
    <link
      href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600&display=swap"
      rel="stylesheet"
    />
    <link
      rel="stylesheet"
      href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css"
    />

    <style>
      .clock {
        font-size: 2rem;
        font-weight: bold;
        margin-bottom: 1rem;
      }
    </style>
  </head>
  <body>
    <div class="container">
      <div class="sidebar">
        <div class="sidebar-title">🦷 ClinicPanel</div>
        <a href="dashboard.html" class="menu-link"
          ><i class="fa fa-chart-line"></i> Dashboard</a
        >
        <a href="patients.html" class="menu-link"
          ><i class="fa fa-user-injured"></i> Patients</a
        >
        <a href="medical_history.html" class="menu-link"
          ><i class="fa fa-notes-medical"></i> Medical History</a
        >
        <a href="labos.html" class="menu-link"
          ><i class="fa fa-flask"></i> Lab Work</a
        >
        <a href="reception.html" class="menu-link active"
          ><i class="fa fa-bell"></i> Reception</a
        >
        <a href="expenses.html" class="menu-link"
          ><i class="fa fa-wallet"></i> Expense</a
        >
        <a href="medical.html" class="menu-link"
          ><i class="fa fa-kit-medical"></i> Medical Supplies</a
        >
        <a href="appointments.html" class="menu-link"
          ><i class="fa fa-calendar-check"></i> Appointments</a
        >
        <a href="chatbot.html" class="menu-link"
          ><i class="fa fa-robot"></i> AI Chatbot</a
        >
        <div class="logout-container">
          <button id="logoutBtn">
            <i class="fa fa-sign-out-alt"></i> Logout
          </button>
        </div>
      </div>
      <div class="content">
        <h1>Reception</h1>
        <div class="clock" id="currentTime"></div>
        <div class="action-group" style="margin-bottom: 10px">
          <button class="primary-btn" data-toggle-target="receptionForm">
            + Add Waiting Patient
          </button>
        </div>
        <div id="receptionForm" class="hidden card collapsible">
          <div class="stacked-form">
            <label>
              Name
              <input
                type="text"
                id="patientwaitingName"
                placeholder="Name"
                required
              />
            </label>
            <label>
              Phone
              <input
                type="text"
                id="patientwaitingPhone"
                placeholder="Phone"
                required
              />
            </label>
            <label>
              Work
              <input
                type="text"
                id="patientwaitingwork"
                placeholder="Work"
                required
              />
            </label>
          </div>
          <div class="form-actions" style="margin-top: 10px">
            <button type="button" class="primary-btn" id="receptionSubmit">
              Save
            </button>
            <button
              type="button"
              class="ghost-btn"
              data-toggle-target="receptionForm"
            >
              Cancel
            </button>
          </div>
        </div>
        <table id="waitingTable"></table>
      </div>
    </div>

    <script src="https://www.gstatic.com/firebasejs/9.22.2/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.22.2/firebase-database-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.22.2/firebase-auth-compat.js"></script>
    <script src="assets/js/firebase.js"></script>
    <script src="assets/js/common.js"></script>
    <script src="assets/js/toast.js"></script>
    <script src="assets/js/reception.js"></script>

    <script>
      if (localStorage.getItem("loggedIn") !== "true") {
        window.location.href = "index.html";
      }
    </script>

    <!-- Toast Container -->
    <div id="toast-container"></div>
  </body>
</html>
