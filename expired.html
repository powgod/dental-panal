<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Trial Expired | ClinicPanel</title>

  <link rel="icon" type="image/png" href="assets/images/favicon.png">

  <!-- Firebase -->
  <script src="https://www.gstatic.com/firebasejs/12.0.0/firebase-app-compat.js"></script>
  <script src="https://www.gstatic.com/firebasejs/12.0.0/firebase-auth-compat.js"></script>
  <script src="assets/js/firebase.js"></script>

  <style>
    *{
      margin:0;
      padding:0;
      box-sizing:border-box;
      font-family:Arial,Helvetica,sans-serif;
    }

    body{
      background:#f5f7fb;
      display:flex;
      justify-content:center;
      align-items:center;
      height:100vh;
      padding:20px;
    }

    .card{
      background:#fff;
      width:470px;
      max-width:100%;
      border-radius:18px;
      padding:45px 35px;
      text-align:center;
      box-shadow:0 15px 40px rgba(0,0,0,.08);
    }

    .logo{
      font-size:70px;
      margin-bottom:15px;
    }

    h1{
      color:#1f2937;
      font-size:30px;
      margin-bottom:15px;
    }

    p{
      color:#6b7280;
      line-height:1.8;
      font-size:16px;
      margin-bottom:25px;
    }

    .days{
      display:inline-block;
      background:#fff4e5;
      color:#d97706;
      padding:10px 18px;
      border-radius:30px;
      font-weight:bold;
      margin-bottom:25px;
    }

    .btn{
      width:100%;
      border:none;
      background:#0d6efd;
      color:white;
      padding:15px;
      border-radius:10px;
      cursor:pointer;
      font-size:17px;
      font-weight:bold;
      transition:.25s;
    }

    .btn:hover{
      background:#0b5ed7;
    }

    .secondary{
      display:block;
      margin-top:18px;
      color:#666;
      text-decoration:none;
      font-size:15px;
      cursor:pointer;
    }

    .footer{
      margin-top:35px;
      font-size:13px;
      color:#999;
    }
  </style>
</head>

<body>

<div class="card">

  <div class="logo">🦷</div>

  <h1>Your Free Trial Has Ended</h1>

  <div class="days">
    14-Day Trial Completed
  </div>

  <p>
    Thank you for trying <strong>ClinicPanel</strong>.
    <br><br>
    We hope it helped you organize your clinic, patients and appointments.
    <br><br>
    Renew your subscription to continue accessing your data securely.
  </p>

  <button class="btn" onclick="renewSubscription()">
    💬 Renew via WhatsApp
  </button>

  <a class="secondary" href="#" onclick="logout()">
    Back to Login
  </a>

  <div class="footer">
    ClinicPanel © 2026
  </div>

</div>

<script>

function renewSubscription() {

  window.open(
    "https://wa.me/212682426294?text=Hello%20ClinicPanel,%20I%20would%20like%20to%20renew%20my%20subscription.",
    "_blank"
  );

}

function logout() {

  localStorage.clear();

  firebase.auth().signOut().then(() => {
    window.location.href = "index.html";
  });

}

</script>

</body>
</html>
